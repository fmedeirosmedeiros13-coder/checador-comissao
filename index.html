<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checador de Comissão — Rede Gazeta</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --navy:#0d2340; --navy2:#16345c; --gold:#c9a227; --teal:#0f6e56;
    --ok:#0f6e56; --okbg:#e1f5ee; --warn:#854f0b; --warnbg:#faeeda;
    --err:#a32d2d; --errbg:#fcebeb; --gray:#5f5e5a; --line:#e2e2dd; --bg:#f5f4ef;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#1a1a18;background:var(--bg)}
  .wrap{max-width:1200px;margin:0 auto;padding:24px}
  header{background:var(--navy);color:#fff;padding:20px 24px;border-radius:12px;display:flex;align-items:center;gap:16px}
  header .bar{width:4px;height:44px;background:var(--gold);border-radius:2px}
  header h1{font-size:20px;margin:0;font-weight:600}
  header p{margin:2px 0 0;font-size:13px;color:#b9c4d6}
  .drop{background:#fff;border:1.5px dashed var(--line);border-radius:12px;padding:20px;text-align:center;transition:.15s}
  .drop.has{border-color:var(--teal);border-style:solid}
  .drop h3{margin:0 0 4px;font-size:14px}
  .drop small{color:var(--gray)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:16px 0}
  .grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin:16px 0}
  .btn{display:inline-block;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer}
  .btn:hover{background:var(--navy2)}
  .btn.gold{background:var(--gold);color:#3a2f06}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0}
  .card{background:#fff;border:.5px solid var(--line);border-radius:10px;padding:14px}
  .card .lbl{font-size:12px;color:var(--gray)}
  .card .val{font-size:22px;font-weight:600;margin-top:4px}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;font-size:13px}
  th,td{padding:9px 12px;text-align:left;border-bottom:.5px solid var(--line)}
  th{background:var(--navy);color:#fff;font-weight:500;position:sticky;top:0}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
  .tag.ok{background:var(--okbg);color:var(--ok)}
  .tag.warn{background:var(--warnbg);color:var(--warn)}
  .tag.err{background:var(--errbg);color:var(--err)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 10px}
  .chip{padding:6px 14px;border:.5px solid var(--line);background:#fff;border-radius:20px;font-size:13px;cursor:pointer}
  .chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .tblwrap{max-height:520px;overflow:auto;border-radius:10px;border:.5px solid var(--line)}
  .muted{color:var(--gray);font-size:13px}
  .tol{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray)}
  .tol input{width:80px;padding:6px 8px;border:.5px solid var(--line);border-radius:6px;text-align:right}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

function parseBRNumber(s){
  if(s===null||s===undefined) return NaN;
  if(typeof s === "number") return s;
  var t = String(s).trim().replace(/\s/g,"");
  if(!t) return NaN;
  // formato BR: 1.234,56  -> remove pontos de milhar, troca vírgula por ponto
  t = t.replace(/\./g,"").replace(",",".");
  var n = parseFloat(t);
  return isNaN(n)? NaN : n;
}
function fmt(n){
  if(n===null||n===undefined||isNaN(n)) return "—";
  return n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function normInt(v){
  if(v===null||v===undefined) return null;
  var t = String(v).replace(/\D/g,"");
  if(!t) return null;
  return String(parseInt(t,10));
}

// ---- Parser do TXT (Relação de Comissões a Pagar) ----
// Cada demonstrativo começa em "Numero da Comissao:" e termina no próximo (ou no fim).
function parseTxt(text){
  var blocks = [];
  // Quebra por "Numero da Comissao:"
  var parts = text.split(/(?=Numero da Comissao:)/);
  parts.forEach(function(chunk){
    if(chunk.indexOf("Numero da Comissao:") < 0) return;
    var mNum = chunk.match(/Numero da Comissao:\s*(\d+)/);
    var mEmp = chunk.match(/Empresa:\s*(\d+)\s*-\s*(.+)/);
    var mComis = chunk.match(/Comis:\s*(\d+)\s*-\s*(.+)/);
    var mForn = chunk.match(/Cod\.?\s*Fornecedor:\s*([\d\.]+)/i);
    var mBruto = chunk.match(/Total\s+Bruto[.\s]*:\s*([\d\.,]+)/i);
    var mIR = chunk.match(/Imposto de Renda[.\s]*:\s*([\d\.,]+)/i);
    var mLiq = chunk.match(/Total\s+L[ií]quido[.\s]*:\s*([\d\.,]+)/i);
    if(!mNum) return;
    blocks.push({
      numeroComissao: normInt(mNum[1]),
      empCode: mEmp? normInt(mEmp[1]) : null,
      empNome: mEmp? mEmp[2].trim() : "",
      comisCode: mComis? normInt(mComis[1]) : null,
      comisNome: mComis? mComis[2].trim() : "",
      codFornecedor: mForn? normInt(mForn[1]) : null,
      totalBruto: mBruto? parseBRNumber(mBruto[1]) : NaN,
      ir: mIR? parseBRNumber(mIR[1]) : NaN,
      totalLiquido: mLiq? parseBRNumber(mLiq[1]) : NaN,
      faturas: (function(){
        var fs = {}, rf = /\d{2}\/\d{2}\/\d{4}\s+(\d{5,8})\b/g, mf;
        while((mf = rf.exec(chunk)) !== null){ var f = normInt(mf[1]); if(f) fs[f] = true; }
        return Object.keys(fs);
      })()
    });
  });
  return blocks;
}

// ---- Parser do Excel TOTVS ----
// Acha a linha de cabeçalho (Emp / Título / Vl Original) e lê só espécie CO.
function parseXlsx(arrayBuffer){
  var wb = XLSX.read(arrayBuffer,{type:"array",cellDates:true});
  var ws = wb.Sheets[wb.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
  var headerIdx = -1, cols = {};
  for(var i=0;i<rows.length;i++){
    var r = rows[i].map(function(c){return c===null?"":String(c).trim().toLowerCase();});
    if(r.indexOf("título")>=0 || r.indexOf("titulo")>=0 || (r.indexOf("emp")>=0 && r.indexOf("esp")>=0)){
      headerIdx = i;
      r.forEach(function(h,idx){
        if(h==="emp") cols.emp=idx;
        else if(h==="est") cols.est=idx;
        else if(h==="esp") cols.esp=idx;
        else if(h==="fornec"||h==="fornecedor") cols.fornec=idx;
        else if(h==="título"||h==="titulo") cols.titulo=idx;
        else if(h==="/p"||h==="parcela") cols.parc=idx;
        else if(h.indexOf("vencto")>=0||h.indexOf("vencimento")>=0) cols.vencto=idx;
        else if(h.indexOf("vl original")>=0 && h.indexOf("apr")<0) cols.vlOrig=idx;
        else if(h.indexOf("vl orig apr")>=0) cols.vlAprov=idx;
      });
      break;
    }
  }
  if(headerIdx<0) throw new Error("Não encontrei o cabeçalho (Emp/Título/Vl Original) no Excel.");
  var out = [];
  for(var j=headerIdx+1;j<rows.length;j++){
    var row = rows[j];
    if(!row) continue;
    var esp = cols.esp!=null? row[cols.esp] : null;
    if(!esp || String(esp).trim().toUpperCase()!=="CO") continue; // só comissão
    var titulo = normInt(row[cols.titulo]);
    if(!titulo) continue;
    var venc = cols.vencto!=null? row[cols.vencto] : null;
    out.push({
      empCode: normInt(row[cols.emp]),
      esp: "CO",
      fornec: cols.fornec!=null? normInt(row[cols.fornec]) : null,
      titulo: titulo,
      parcela: cols.parc!=null? (row[cols.parc]||"") : "",
      vencto: (venc instanceof Date)? venc : null,
      vlOriginal: parseBRNumber(row[cols.vlOrig])
    });
  }
  return out;
}

// ---- Extrai texto de um PDF (pdf.js) ----
function pdfToText(arrayBuffer){
  return pdfjsLib.getDocument({data: arrayBuffer}).promise.then(function(pdf){
    var pages = [];
    for(var p=1;p<=pdf.numPages;p++){ pages.push(p); }
    return pages.reduce(function(chain, p){
      return chain.then(function(acc){
        return pdf.getPage(p).then(function(page){
          return page.getTextContent().then(function(c){
            return acc + c.items.map(function(i){return i.str;}).join(" ") + "\n";
          });
        });
      });
    }, Promise.resolve(""));
  });
}

// ---- Parser da NFS-e (texto extraído) — independente de layout ----
// Não tenta adivinhar a redação: coleta candidatos liberais + guarda o texto p/ casar
// contra os números dos relatórios (gabarito), e todos os valores em R$.
function parseNf(text, fileName){
  var textUpper = deburr(String(text||"").toUpperCase());
  // candidatos a número de comissão (várias redações) — usados p/ detectar órfãos
  var candSet = {};
  [ /N[UÚ]MERO DA COMISS[AÃ]O[:\s.]*([0-9]{3,6})/gi,
    /COMISS[AÃ]O[^0-9]{0,32}?([0-9]{3,6})/gi,
    /([0-9]{3,6})[^0-9]{0,18}?COMISS[AÃ]O/gi,
    /(?:SOB\s+NUMERO|N[UÚ]MERO|RELAT[OÓ]RIO|REF\.?|REFERENTE)[^0-9]{0,22}?([0-9]{3,6})/gi
  ].forEach(function(re){
    var m; while((m = re.exec(textUpper)) !== null){ var n = normInt(m[1]); if(n) candSet[n] = true; }
  });
  var candidatos = Object.keys(candSet);
  // todos os valores em R$ (BR)
  var moneys = [];
  var reM = /([0-9][0-9.]*,[0-9]{2})/g, mm;
  while((mm = reM.exec(text)) !== null){ var v = parseBRNumber(mm[1]); if(!isNaN(v)) moneys.push(v); }
  var maxMoney = moneys.length ? Math.max.apply(null, moneys) : NaN;
  // valor do serviço (bruto): rótulo genérico; se falhar, cai no maior valor
  var mVs = text.match(/VALOR\s+(?:DO\s+)?SERVI[ÇC]O[\s\S]{0,80}?([\d.]+,\d{2})/i);
  var mVl = text.match(/VALOR\s+L[IÍ]QUIDO[\s\S]{0,80}?([\d.]+,\d{2})/i);
  var valorServico = mVs ? parseBRNumber(mVs[1]) : maxMoney;
  // chave de acesso NFS-e nacional (44-50 dígitos), se houver
  var mCh = String(text||"").replace(/\s/g,"").match(/([0-9]{44,50})/);
  // nomes (melhor esforço, só para exibição)
  var razoes = [];
  var reR = /(?:Raz[aã]o Social|Nome\s*\/\s*Nome Empresarial|Nome Empresarial)\s*:?\s*[\r\n]*\s*([^\n\r]+)/gi, mr;
  while((mr = reR.exec(text)) !== null){
    var vv = mr[1].trim();
    if(vv && /[A-Za-zÀ-ÿ]{3,}/.test(vv) && !/^(CNPJ|CPF|NIF|E-?mail|Endere)/i.test(vv)) razoes.push(vv);
  }
  var mRps = text.match(/N[uú]mero da NFS-?e[\s\S]{0,40}?(\d{2,})/i)
          || text.match(/N[uú]mero RPS[\s\S]{0,40}?(\d{3,})/i)
          || text.match(/RPS\s+(\d{2,})/i);
  return {
    fileName: fileName,
    tipo: "NF",
    candidatos: candidatos,
    moneys: moneys,
    valorServico: valorServico,
    valorLiquido: mVl ? parseBRNumber(mVl[1]) : NaN,
    prestador: razoes.length > 0 ? razoes[0] : "",
    tomador: razoes.length > 1 ? razoes[1] : "",
    chave: mCh ? mCh[1] : "",
    rps: mRps ? mRps[1] : (fileName || "").replace(/\D/g,"").slice(0,6),
    textUpper: textUpper
  };
}

// ---- Parser do RECIBO de pessoa física (texto) ----
// Traz nº da comissão no "REC.: NNN", faturas nos itens, bruto (COMISSAO/VALORES),
// líquido (VALOR LIQUIDO), INSS, nome (pessoa) e empresa ("RECEB(EMOS) DE ...").
function parseRecibo(text, fileName){
  var textUpper = deburr(String(text||"").toUpperCase());
  var candSet = {};
  var mRec = text.match(/REC\.?\s*:\s*([\d.]+)/i);        // nº da comissão
  if(mRec){ var nr = normInt(mRec[1]); if(nr) candSet[nr] = true; }
  // faturas (coluna AUT/FAT dos itens)
  var rf = /\d{2}\/\d{2}\/\d{2,4}\s+(\d{4,8})\s/g, mf, faturas = {};
  while((mf = rf.exec(text)) !== null){ var ff = normInt(mf[1]); if(ff) faturas[ff] = true; }
  var moneys = [];
  var reM = /([0-9][0-9.]*,[0-9]{2})/g, mm;
  while((mm = reM.exec(text)) !== null){ var v = parseBRNumber(mm[1]); if(!isNaN(v)) moneys.push(v); }
  var mBr = text.match(/COMISSAO\s+VALORES[\s\S]{0,80}?([\d.]+,\d{2})/i);
  var mLq = text.match(/VALOR\s+LIQUIDO[\s\S]{0,40}?([\d.]+,\d{2})/i);
  var mNome = text.match(/NOME\s*:\s*([^\|\r\n]+)/i);
  var mEmp = text.match(/RECEB\(EMOS\)\s+DE\s+(.+?)\s+A\s+IMPORTANCIA/i);
  return {
    fileName: fileName,
    tipo: "Recibo",
    candidatos: Object.keys(candSet),
    faturasCitadas: Object.keys(faturas),
    moneys: moneys,
    valorServico: mBr ? parseBRNumber(mBr[1]) : NaN,   // bruto da comissão (não o faturamento)
    valorLiquido: mLq ? parseBRNumber(mLq[1]) : NaN,
    prestador: mNome ? mNome[1].trim() : "",
    tomador: mEmp ? mEmp[1].trim() : "",
    chave: "",
    rps: mRec ? normInt(mRec[1]) : (fileName || "").replace(/[^0-9]/g,"").slice(-6),
    textUpper: textUpper
  };
}

// procura um número de comissão dentro do texto (tolera zeros à esquerda e ponto de milhar)
function numInText(num, textUpper){
  if(!num || !textUpper) return false;
  var t = String(textUpper).replace(/(\d)\.(\d)/g, "$1$2"); // colapsa 134.250 -> 134250
  return new RegExp("(^|[^0-9])0*" + num + "([^0-9]|$)").test(t);
}

// remove acentos
function deburr(s){
  return String(s||"").normalize ? String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"") : String(s||"");
}
// tokens úteis pra comparar nomes de empresas/pessoas
function nameTokens(s){
  return deburr(String(s||"").toUpperCase())
    .replace(/LTDA|S\/A|S\.A|EIRELI|ME|EPP|COMUNICA[CÇ][AÃ]O|R[AÁ]DIO|TELEVIS[AÃ]O|E TV|DE|E|DA|DO|DAS|DOS/g," ")
    .replace(/[^A-Z0-9 ]/g," ").split(/\s+/).filter(function(t){return t.length>=3;});
}
function nameOverlap(a,b){
  var ta=nameTokens(a), tb=nameTokens(b), set={}, hit=0;
  ta.forEach(function(t){set[t]=true;});
  tb.forEach(function(t){if(set[t]) hit++;});
  return hit;
}
// nome do comissionado aparece no texto da NF? (à prova de layout)
function nameInText(comisNome, textUpper){
  var toks = nameTokens(comisNome);
  if(!toks.length || !textUpper) return false;
  var hit = 0;
  toks.forEach(function(t){ if(textUpper.indexOf(t) >= 0) hit++; });
  return hit >= Math.min(2, toks.length); // pelo menos 2 tokens (ou todos, se tiver 1)
}
// versão frouxa: basta 1 token distintivo — usada só no fallback (já exige valor+empresa)
function nameInTextLoose(comisNome, textUpper){
  var toks = nameTokens(comisNome);
  if(!toks.length || !textUpper) return false;
  return toks.some(function(t){ return textUpper.indexOf(t) >= 0; });
}
function uniq(arr){ var s={}, o=[]; arr.forEach(function(x){ if(!s[x]){ s[x]=true; o.push(x); } }); return o; }

// ---- Reconciliação: chave Empresa + Título(=Nº Comissão) ----
function reconcile(txtBlocks, totvsRows, nfList, tol){
  var totvsByKey = {};
  totvsRows.forEach(function(t){
    var k = t.empCode + "|" + t.titulo;
    if(!totvsByKey[k]) totvsByKey[k] = [];
    totvsByKey[k].push(t);
  });
  var usedKeys = {};
  var results = [];
  txtBlocks.forEach(function(b){
    var k = b.empCode + "|" + b.numeroComissao;
    var matches = totvsByKey[k] || [];
    var bruto = b.totalBruto;
    var ir = isNaN(b.ir) ? 0 : b.ir;
    var liquido = isNaN(b.totalLiquido) ? (bruto - ir) : b.totalLiquido;
    var base = {
      empCode: b.empCode, empNome: b.empNome,
      numeroComissao: b.numeroComissao, comisNome: b.comisNome,
      bruto: bruto, ir: ir, liquido: liquido, faturas: b.faturas || [],
      nfRps: "", nfStatus: "SEM_NF"
    };
    if(matches.length){
      usedKeys[k] = true;
      var somaTotvs = matches.reduce(function(a,m){return a + (isNaN(m.vlOriginal)?0:m.vlOriginal);},0);
      var diff = liquido - somaTotvs; // TOTVS registra o líquido (já com IR retido)
      base.status = Math.abs(diff) <= tol ? "OK" : "DIVERGE";
      base.fornecTotvs = matches.map(function(m){return m.fornec;}).join(", ");
      base.valorTotvs = somaTotvs; base.diff = diff;
      base.vencto = matches[0].vencto; base.nTitulos = matches.length;
    } else {
      base.status = "SO_TXT"; base.fornecTotvs = "";
      base.valorTotvs = NaN; base.diff = NaN; base.vencto = null; base.nTitulos = 0;
    }
    results.push(base);
  });
  // Títulos CO no TOTVS que não têm demonstrativo no TXT
  Object.keys(totvsByKey).forEach(function(k){
    if(usedKeys[k]) return;
    var arr = totvsByKey[k];
    var soma = arr.reduce(function(a,m){return a+(isNaN(m.vlOriginal)?0:m.vlOriginal);},0);
    results.push({
      status:"SO_TOTVS", empCode:arr[0].empCode, empNome:"",
      numeroComissao:arr[0].titulo, comisNome:"", fornecTotvs:arr.map(function(m){return m.fornec;}).join(", "),
      bruto:NaN, ir:NaN, liquido:NaN, valorTotvs:soma, diff:NaN, vencto:arr[0].vencto, nTitulos:arr.length,
      nfRps:"", nfStatus:"SO_TOTVS"
    });
  });

  // ---- Camada NF: gabarito — números dos relatórios procurados no texto da NF ----
  var validNums = {};
  results.forEach(function(r){ if(r.status !== "SO_TOTVS") validNums[r.numeroComissao] = true; });

  var nfMeta = (nfList || []).map(function(nf, i){
    var resolved = [], vias = {};
    function key(r){ return r.empCode + "|" + r.numeroComissao; }
    // 1) número da comissão no texto
    results.forEach(function(r){
      if(r.status === "SO_TOTVS") return;
      if(numInText(r.numeroComissao, nf.textUpper)){ resolved.push(r); vias[key(r)] = "comissão"; }
    });
    // 2) número da fatura (item do relatório) no texto — para os que ainda não casaram
    results.forEach(function(r){
      if(r.status === "SO_TOTVS" || vias[key(r)]) return;
      if((r.faturas || []).some(function(f){ return numInText(f, nf.textUpper); })){ resolved.push(r); vias[key(r)] = "fatura"; }
    });
    // 3) fallback: razão social (comissionado) + valor (bruto/líquido) + empresa (tomador)
    //    só quando a NF não casou por número nem fatura
    if(resolved.length === 0){
      results.forEach(function(r){
        if(r.status === "SO_TOTVS") return;
        var nomeHit = nameInTextLoose(r.comisNome, nf.textUpper);
        var empHit  = nameInText(r.empNome, nf.textUpper);
        var valHit  = (nf.moneys || []).some(function(v){ return Math.abs(v - r.bruto) <= tol || Math.abs(v - r.liquido) <= tol; });
        if(nomeHit && empHit && valHit){ resolved.push(r); vias[key(r)] = "razão+valor"; }
      });
    }
    // órfãos: candidatos numéricos citados que não existem em relatório algum
    var orfaos = uniq((nf.candidatos || []).map(normInt).filter(Boolean)).filter(function(c){ return !validNums[c]; });
    return { nf: nf, idx: i, resolved: resolved, vias: vias, orfaos: orfaos };
  });

  // union-find sobre nós "N:idx" (NFs) e "D:empCode|num" (relatórios)
  var parent = {};
  function find(x){ if(parent[x] === undefined) parent[x] = x; if(parent[x] !== x) parent[x] = find(parent[x]); return parent[x]; }
  function union(a,b){ parent[find(a)] = find(b); }
  nfMeta.forEach(function(nm){
    var nkey = "N:" + nm.idx; find(nkey);
    nm.resolved.forEach(function(d){ union(nkey, "D:" + d.empCode + "|" + d.numeroComissao); });
  });

  // agrupa por raiz (só grupos que contêm ao menos uma NF)
  var comps = {};
  nfMeta.forEach(function(nm){
    var root = find("N:" + nm.idx);
    if(!comps[root]) comps[root] = { nfs: [], dems: {}, orfaos: [], vias: {} };
    comps[root].nfs.push(nm.nf);
    comps[root].orfaos = comps[root].orfaos.concat(nm.orfaos);
    nm.resolved.forEach(function(d){ comps[root].dems[d.empCode + "|" + d.numeroComissao] = d; });
    Object.keys(nm.vias).forEach(function(k){ comps[root].vias[nm.vias[k]] = true; });
  });

  var groups = Object.keys(comps).map(function(root){
    var c = comps[root];
    var dems = Object.keys(c.dems).map(function(k){ return c.dems[k]; });
    var sumNf = c.nfs.reduce(function(a,n){ var v = !isNaN(n.valorServico)?n.valorServico:n.valorLiquido; return a + (isNaN(v)?0:v); }, 0);
    var sumBruto = dems.reduce(function(a,d){ return a + (isNaN(d.bruto)?0:d.bruto); }, 0);
    var diff = sumNf - sumBruto;
    var orfaos = uniq(c.orfaos);
    var status;
    if(dems.length === 0){ status = (orfaos.length > 0) ? "ORFA" : "SEM_NUM"; }
    else if(orfaos.length > 0){ status = "PARCIAL"; }
    else if(Math.abs(diff) <= tol){ status = "NF_OK"; }
    else { status = "NF_DIVERGE"; }
    // validador de razão social: comissionado(relatório) aparece no texto de alguma NF do grupo
    var nomeOk = (dems.length > 0) && dems.every(function(d){
      return c.nfs.some(function(n){ return nameInText(d.comisNome, n.textUpper); });
    });
    var cardinal = c.nfs.length + ":" + dems.length; // NFs : relatórios
    // anota nos demonstrativos do grupo
    dems.forEach(function(d){
      d.nfRps = c.nfs.map(function(n){ return n.rps; }).join(", ");
      d.nfStatus = (status === "NF_DIVERGE") ? "NF_DIVERGE" : "NF_OK";
      d.nfNomeOk = nomeOk;
    });
    return {
      nfs: c.nfs, dems: dems, sumNf: sumNf, sumBruto: sumBruto, diff: diff,
      orfaos: orfaos, status: status, nomeOk: nomeOk, cardinal: cardinal,
      via: Object.keys(c.vias).join(", ")
    };
  });

  return { rows: results, groups: groups };
}

function Drop({label, hint, fileName, onFile, accept, multiple}){
  var ref = React.useRef();
  return (
    <div className={"drop"+(fileName?" has":"")}>
      <h3>{label}</h3>
      <small>{fileName ? ("✓ "+fileName) : hint}</small>
      <div style={{marginTop:10}}>
        <button className="btn" onClick={function(){ref.current.click();}}>{multiple?"Selecionar arquivos":"Selecionar arquivo"}</button>
        <input ref={ref} type="file" accept={accept} multiple={multiple?true:false} style={{display:"none"}}
          onChange={function(e){ if(e.target.files.length) onFile(multiple?e.target.files:e.target.files[0]); }} />
      </div>
    </div>
  );
}

function App(){
  const [txtName,setTxtName]=useState("");
  const [xlsName,setXlsName]=useState("");
  const [nfName,setNfName]=useState("");
  const [recName,setRecName]=useState("");
  const [txtBlocks,setTxtBlocks]=useState(null);
  const [totvsRows,setTotvsRows]=useState(null);
  const [nfList,setNfList]=useState(null);
  const [recList,setRecList]=useState(null);
  const [tol,setTol]=useState(0.01);
  const [filter,setFilter]=useState("ALL");
  const [err,setErr]=useState("");

  const loadTxt = useCallback(function(fileList){
    setErr("");
    var files = Array.prototype.slice.call(fileList.length!==undefined && !fileList.name ? fileList : [fileList]);
    var dec = new TextDecoder("windows-1252");
    var readOne = function(file){
      return new Promise(function(resolve,reject){
        var reader = new FileReader();
        reader.onload = function(){
          try{ resolve(parseTxt(dec.decode(reader.result)).map(function(b){b.sourceFile=file.name;return b;})); }
          catch(e){ reject(e); }
        };
        reader.onerror = function(){ reject(new Error("Falha ao ler "+file.name)); };
        reader.readAsArrayBuffer(file);
      });
    };
    Promise.all(files.map(readOne)).then(function(lists){
      var all = [].concat.apply([], lists);
      // dedupe por Empresa + Nº Comissão (mesmo demonstrativo em 2 arquivos)
      var seen = {}, dedup = [], dups = 0;
      all.forEach(function(b){
        var k = b.empCode + "|" + b.numeroComissao;
        if(seen[k]){ dups++; return; }
        seen[k] = true; dedup.push(b);
      });
      if(!dedup.length){ setErr("Nenhum demonstrativo encontrado nos TXT."); return; }
      setTxtBlocks(dedup);
      setTxtName(files.length + " arquivo(s) · " + dedup.length + " demonstrativo(s)" + (dups?(" · "+dups+" duplicado(s) ignorado(s)"):""));
    }).catch(function(e){ setErr("Erro no TXT: "+e.message); });
  },[]);

  const loadXls = useCallback(function(file){
    setErr("");
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var rows = parseXlsx(reader.result);
        if(!rows.length){ setErr("Nenhum título espécie CO encontrado no Excel."); return; }
        setTotvsRows(rows); setXlsName(file.name);
      }catch(e){ setErr("Erro no Excel: "+e.message); }
    };
    reader.readAsArrayBuffer(file);
  },[]);

  const loadNf = useCallback(function(fileList){
    setErr("");
    try{ pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; }catch(e){}
    var files = Array.prototype.slice.call(fileList.length!==undefined && !fileList.name ? fileList : [fileList]);
    var readOne = function(file){
      return new Promise(function(resolve,reject){
        var reader = new FileReader();
        reader.onload = function(){
          pdfToText(new Uint8Array(reader.result)).then(function(text){
            resolve(parseNf(text, file.name));
          }).catch(reject);
        };
        reader.onerror = function(){ reject(new Error("Falha ao ler "+file.name)); };
        reader.readAsArrayBuffer(file);
      });
    };
    Promise.all(files.map(readOne)).then(function(list){
      var comTotal = list.reduce(function(a,n){return a + (n.candidatos ? n.candidatos.length : 0);},0);
      setNfList(list);
      setNfName(files.length + " NF(s) · " + comTotal + " nº citado(s) detectado(s)");
    }).catch(function(e){ setErr("Erro na NF (PDF): "+(e && e.message ? e.message : e)); });
  },[]);

  const loadRecibo = useCallback(function(fileList){
    setErr("");
    var files = Array.prototype.slice.call(fileList.length!==undefined && !fileList.name ? fileList : [fileList]);
    var dec = new TextDecoder("windows-1252");
    var readOne = function(file){
      return new Promise(function(resolve,reject){
        var reader = new FileReader();
        reader.onload = function(){
          try{ resolve(parseRecibo(dec.decode(reader.result), file.name)); }
          catch(e){ reject(e); }
        };
        reader.onerror = function(){ reject(new Error("Falha ao ler "+file.name)); };
        reader.readAsArrayBuffer(file);
      });
    };
    Promise.all(files.map(readOne)).then(function(list){
      var comTotal = list.reduce(function(a,n){return a + (n.candidatos ? n.candidatos.length : 0);},0);
      setRecList(list);
      setRecName(files.length + " recibo(s) · " + comTotal + " nº de comissão");
    }).catch(function(e){ setErr("Erro no recibo (TXT): "+(e && e.message ? e.message : e)); });
  },[]);

  const results = useMemo(function(){
    if(!txtBlocks||!totvsRows) return null;
    var comprovantes = (nfList || []).concat(recList || []);
    return reconcile(txtBlocks, totvsRows, comprovantes, tol);
  },[txtBlocks,totvsRows,nfList,recList,tol]);

  const stats = useMemo(function(){
    if(!results) return null;
    var s={OK:0,DIVERGE:0,SO_TXT:0,SO_TOTVS:0,bruto:0,ir:0,liquido:0,valTotvs:0,SEM_NF:0,COM_NF:0,NF_DIVERGE:0};
    results.rows.forEach(function(r){
      s[r.status]++;
      if(!isNaN(r.bruto)) s.bruto+=r.bruto;
      if(!isNaN(r.ir)) s.ir+=r.ir;
      if(!isNaN(r.liquido)) s.liquido+=r.liquido;
      if(!isNaN(r.valorTotvs)) s.valTotvs+=r.valorTotvs;
      if(r.status!=="SO_TOTVS"){
        if(r.nfStatus==="SEM_NF") s.SEM_NF++;
        else if(r.nfStatus==="NF_DIVERGE") s.NF_DIVERGE++;
        else if(r.nfStatus==="NF_OK") s.COM_NF++;
      }
    });
    s.nfOrfas = results.groups.filter(function(g){return g.status==="ORFA"||g.status==="PARCIAL";}).length;
    s.nomeDiverge = results.groups.filter(function(g){return g.dems.length>0 && !g.nomeOk;}).length;
    return s;
  },[results]);

  const shown = useMemo(function(){
    if(!results) return [];
    if(filter==="ALL") return results.rows;
    if(filter==="SEM_NF") return results.rows.filter(function(r){return r.status!=="SO_TOTVS" && r.nfStatus==="SEM_NF";});
    if(filter==="NF_DIVERGE") return results.rows.filter(function(r){return r.nfStatus==="NF_DIVERGE";});
    return results.rows.filter(function(r){return r.status===filter;});
  },[results,filter]);

  const exportCsv = useCallback(function(){
    if(!results) return;
    var head = ["Status TOTVS","Empresa","Nome Empresa","Nº Comissão / Título","Comissionado","Fornec TOTVS","Bruto TXT","IR","Líquido TXT","Vl Original TOTVS","Diferença TOTVS","NF (RPS)","Situação NF","Vencimento","Qtd Títulos"];
    var lines = [head.join(";")];
    results.rows.forEach(function(r){
      var v = r.vencto? (("0"+r.vencto.getDate()).slice(-2)+"/"+("0"+(r.vencto.getMonth()+1)).slice(-2)+"/"+r.vencto.getFullYear()) : "";
      lines.push([r.status,r.empCode,'"'+r.empNome+'"',r.numeroComissao,'"'+r.comisNome+'"','"'+r.fornecTotvs+'"',
        isNaN(r.bruto)?"":fmt(r.bruto),isNaN(r.ir)?"":fmt(r.ir),isNaN(r.liquido)?"":fmt(r.liquido),
        isNaN(r.valorTotvs)?"":fmt(r.valorTotvs),isNaN(r.diff)?"":fmt(r.diff),
        '"'+(r.nfRps||"")+'"', r.nfStatus||"", v, r.nTitulos].join(";"));
    });
    var blob = new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
    var a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="checagem_comissao.csv"; a.click();
  },[results]);

  function tagOf(st){
    if(st==="OK") return <span className="tag ok">OK</span>;
    if(st==="DIVERGE") return <span className="tag err">DIVERGE</span>;
    if(st==="SO_TXT") return <span className="tag warn">Só no TXT</span>;
    return <span className="tag warn">Só no TOTVS</span>;
  }
  function tagNf(st){
    if(st==="NF_OK") return <span className="tag ok">comprov. ok</span>;
    if(st==="NF_DIVERGE") return <span className="tag err">valor diverge</span>;
    return <span className="tag warn">sem comprov.</span>;
  }
  function tagNfRow(st){
    if(st==="NF_OK") return <span className="tag ok">OK</span>;
    if(st==="NF_DIVERGE") return <span className="tag err">Valor diverge</span>;
    if(st==="PARCIAL") return <span className="tag warn">Parcial (órfã)</span>;
    if(st==="SEM_NUM") return <span className="tag warn">Sem nº na NF</span>;
    return <span className="tag warn">Órfã</span>;
  }
  function vencStr(d){ return d? (("0"+d.getDate()).slice(-2)+"/"+("0"+(d.getMonth()+1)).slice(-2)+"/"+d.getFullYear()) : "—"; }
  var hasComp = !!(nfList || recList);

  return (
    <div className="wrap">
      <header>
        <div className="bar"></div>
        <div>
          <h1>Checador de Comissão Registrada</h1>
          <p>Demonstrativo (TXT) × TOTVS (CO) × Nota Fiscal / Recibo · Rede Gazeta</p>
        </div>
      </header>

      <div className="grid4">
        <Drop label="1. Relações de Comissões (.TXT)" hint="Um ou vários demonstrativos"
          fileName={txtName} onFile={loadTxt} accept=".txt,.TXT" multiple={true} />
        <Drop label="2. Contas a Pagar TOTVS (.xlsx)" hint="Export com espécie CO"
          fileName={xlsName} onFile={loadXls} accept=".xlsx,.xls" />
        <Drop label="3. Notas Fiscais (.pdf)" hint="Uma ou várias NFS-e — opcional"
          fileName={nfName} onFile={loadNf} accept=".pdf" multiple={true} />
        <Drop label="4. Recibos (.txt)" hint="Pessoa física — opcional"
          fileName={recName} onFile={loadRecibo} accept=".txt,.TXT" multiple={true} />
      </div>

      {err ? <div className="card" style={{borderColor:"var(--err)",color:"var(--err)"}}>{err}</div> : null}

      {results ? (
        <div>
          <div className="cards">
            <div className="card"><div className="lbl">Casados OK</div><div className="val" style={{color:"var(--ok)"}}>{stats.OK}</div></div>
            <div className="card"><div className="lbl">Divergentes</div><div className="val" style={{color:"var(--err)"}}>{stats.DIVERGE}</div></div>
            <div className="card"><div className="lbl">Só no TXT</div><div className="val" style={{color:"var(--warn)"}}>{stats.SO_TXT}</div></div>
            <div className="card"><div className="lbl">Só no TOTVS</div><div className="val" style={{color:"var(--warn)"}}>{stats.SO_TOTVS}</div></div>
            <div className="card"><div className="lbl">Bruto TXT</div><div className="val">{fmt(stats.bruto)}</div></div>
            <div className="card"><div className="lbl">IR retido</div><div className="val" style={{color:"var(--gold)"}}>{fmt(stats.ir)}</div></div>
            <div className="card"><div className="lbl">Líquido TXT</div><div className="val">{fmt(stats.liquido)}</div></div>
            <div className="card"><div className="lbl">Total TOTVS</div><div className="val">{fmt(stats.valTotvs)}</div></div>
            {hasComp ? [
              <div className="card" key="cnf"><div className="lbl">Com comprovante OK</div><div className="val" style={{color:"var(--ok)"}}>{stats.COM_NF}</div></div>,
              <div className="card" key="dnf"><div className="lbl">Valor diverge</div><div className="val" style={{color:"var(--err)"}}>{stats.NF_DIVERGE}</div></div>,
              <div className="card" key="snf"><div className="lbl">Sem comprovante</div><div className="val" style={{color:"var(--warn)"}}>{stats.SEM_NF}</div></div>,
              <div className="card" key="onf"><div className="lbl">Órfã/parcial</div><div className="val" style={{color:"var(--warn)"}}>{stats.nfOrfas}</div></div>,
              <div className="card" key="rnf"><div className="lbl">Razão social diverge</div><div className="val" style={{color:"var(--err)"}}>{stats.nomeDiverge}</div></div>
            ] : null}
          </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <div className="tol">
              Tolerância de valor: R$
              <input type="number" step="0.01" value={tol}
                onChange={function(e){setTol(parseBRNumber(e.target.value)||0);}} />
            </div>
            <button className="btn gold" onClick={exportCsv}>Exportar CSV</button>
          </div>

          <div className="filters">
            {[["ALL","Todos"],["DIVERGE","Divergentes"],["OK","OK"],["SO_TXT","Só no TXT"],["SO_TOTVS","Só no TOTVS"]].concat(hasComp?[["SEM_NF","Sem comprovante"],["NF_DIVERGE","Valor diverge"]]:[]).map(function(f){
              return <div key={f[0]} className={"chip"+(filter===f[0]?" active":"")} onClick={function(){setFilter(f[0]);}}>{f[1]}</div>;
            })}
          </div>

          <div className="tblwrap">
            <table>
              <thead>
                <tr>
                  <th>Status</th><th>Emp</th><th>Nº Comissão / Título</th><th>Comissionado</th>
                  <th>Fornec TOTVS</th><th className="num">Bruto (TXT)</th><th className="num">IR</th>
                  <th className="num">Líquido (TXT)</th><th className="num">Vl Original (TOTVS)</th>
                  <th className="num">Diferença</th>{hasComp?<th>Comprov.</th>:null}<th>Vencto</th>
                </tr>
              </thead>
              <tbody>
                {shown.map(function(r,i){
                  return (
                    <tr key={i}>
                      <td>{tagOf(r.status)}</td>
                      <td>{r.empCode}{r.empNome?(" - "+r.empNome):""}</td>
                      <td>{r.numeroComissao}{r.nTitulos>1?(" ("+r.nTitulos+" tít.)"):""}</td>
                      <td>{r.comisNome||"—"}</td>
                      <td>{r.fornecTotvs||"—"}</td>
                      <td className="num">{fmt(r.bruto)}</td>
                      <td className="num" style={{color:(!isNaN(r.ir)&&r.ir>0)?"var(--gold)":"inherit"}}>{fmt(r.ir)}</td>
                      <td className="num">{fmt(r.liquido)}</td>
                      <td className="num">{fmt(r.valorTotvs)}</td>
                      <td className="num" style={{color: (!isNaN(r.diff)&&Math.abs(r.diff)>tol)?"var(--err)":"inherit"}}>{fmt(r.diff)}</td>
                      {hasComp?<td>{r.status==="SO_TOTVS"?"—":tagNf(r.nfStatus)}{r.nfRps?(" "+r.nfRps):""}</td>:null}
                      <td>{vencStr(r.vencto)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <p className="muted" style={{marginTop:10}}>
            Chave: <b>Empresa + Número da Comissão = Título (CO)</b>. O TOTVS registra o <b>líquido</b> (IR retido) → a coluna Diferença compara <b>Líquido (TXT) × Vl Original (TOTVS)</b>. A NF é emitida pelo <b>bruto</b> e casa por Número da Comissão (o tomador da NF é a empresa).
          </p>

          {hasComp && results.groups.length ? (
            <div style={{marginTop:26}}>
              <h3 style={{fontSize:15,margin:"0 0 8px"}}>Conferência Relatório × Comprovante (NF / Recibo)</h3>
              <div className="tblwrap">
                <table>
                  <thead>
                    <tr>
                      <th>Situação</th><th>Tipo</th><th>Comprov.</th><th>Casou por</th><th>Nº / arquivo</th><th>Relatório (comissões)</th>
                      <th>Comissionado (relatório)</th><th>Prestador</th><th>Razão social</th>
                      <th className="num">Σ Valor</th><th className="num">Σ Bruto relatório</th><th className="num">Diferença</th>
                    </tr>
                  </thead>
                  <tbody>
                    {results.groups.map(function(g,i){
                      var rps = g.nfs.map(function(n){return n.rps || (n.fileName||"").replace(/\.(pdf|txt)$/i,"");}).join(", ");
                      var tipos = uniq(g.nfs.map(function(n){return n.tipo||"NF";})).join(", ");
                      var coms = g.dems.map(function(d){return d.numeroComissao;}).join(", ");
                      var comNomes = uniq(g.dems.map(function(d){return d.comisNome;}).filter(Boolean)).join(" / ");
                      var prestNomes = uniq(g.nfs.map(function(n){return n.prestador;}).filter(Boolean)).join(" / ");
                      var noVal = (g.status==="ORFA"||g.status==="SEM_NUM");
                      return (
                        <tr key={i}>
                          <td>{tagNfRow(g.status)}</td>
                          <td>{g.cardinal}</td>
                          <td>{tipos}</td>
                          <td>{g.via||"—"}</td>
                          <td>{rps}{g.orfaos.length?(" · órfã(s): "+g.orfaos.join(", ")):""}</td>
                          <td>{coms||"—"}</td>
                          <td>{comNomes||"—"}</td>
                          <td>{prestNomes||"—"}</td>
                          <td>{g.dems.length===0 ? "—" : (g.nomeOk ? <span className="tag ok">confere</span> : <span className="tag err">diverge</span>)}</td>
                          <td className="num">{fmt(g.sumNf)}</td>
                          <td className="num">{fmt(g.sumBruto)}</td>
                          <td className="num" style={{color:(!isNaN(g.diff)&&Math.abs(g.diff)>tol&&!noVal)?"var(--err)":"inherit"}}>{noVal?"—":fmt(g.diff)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <p className="muted" style={{marginTop:8}}>
                <b>Tipo</b> = comprovantes : relatórios do grupo (1:1, 1:N, N:1, N:M). <b>Comprov.</b> = NF (empresa) ou Recibo (pessoa física, retém INSS). O casamento tenta, em ordem: (1) <b>número da comissão</b> no texto, (2) <b>número da fatura</b> (item do relatório), (3) <b>razão social + valor + empresa</b> quando só há valor. O valor confere pela soma dos comprovantes × soma dos brutos. "Órfã" = número citado sem relatório; "Sem nº" = comprovante sem número nem fatura reconhecível.
              </p>
            </div>
          ) : null}
        </div>
      ) : (
        <p className="muted" style={{marginTop:24}}>Carregue o TXT e o Excel para rodar a checagem. Notas Fiscais (PDF) e Recibos (TXT, pessoa física) são opcionais e habilitam a conferência do comprovante.</p>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
